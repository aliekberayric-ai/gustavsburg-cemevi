<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Gustavsburg Cem Evi</title>

  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <!-- HEADER -->
  <header class="topbar">
    <div class="page" style="padding-top:12px;padding-bottom:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">
        
        <!-- BRAND -->
        <a href="#/" class="site-brand" style="text-decoration:none;color:inherit;">
          <img id="brandLogo" class="hidden" src="" alt="Logo" />
          <span id="brandTitle">Gustavsburg Cem Evi</span>
        </a>

        <!-- NAV -->
       <nav class="main-nav" style="display:flex;align-items:center;gap:22px;flex-wrap:wrap;">
  <a href="#/" style="color:#ffffff;font-size:22px;font-weight:700;text-decoration:none;">Start</a>
  <a href="#/gallery" style="color:#ffffff;font-size:22px;font-weight:700;text-decoration:none;">Galerie</a>
  <a href="#/calendar" style="color:#ffffff;font-size:22px;font-weight:700;text-decoration:none;">Kalender</a>
  <a href="#/people" style="color:#ffffff;font-size:22px;font-weight:700;text-decoration:none;">Team</a>
  <a href="#/forms" style="color:#ffffff;font-size:22px;font-weight:700;text-decoration:none;">Formulare</a>
  <a href="#/admin" style="color:#ffffff;font-size:22px;font-weight:700;text-decoration:none;">Admin</a>
</nav>

        <!-- RIGHT SIDE -->
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
          <!-- LANGUAGE -->
          <div class="lang-switch">
            <button type="button" class="lang-btn active" data-lang="de" aria-label="Deutsch">
              <img src="https://flagcdn.com/w40/de.png" alt="Deutsch">
            </button>

            <button type="button" class="lang-btn" data-lang="en" aria-label="English">
              <img src="https://flagcdn.com/w40/gb.png" alt="English">
            </button>

            <button type="button" class="lang-btn" data-lang="tr" aria-label="Türkçe">
              <img src="https://flagcdn.com/w40/tr.png" alt="Türkçe">
            </button>
          </div>

          <!-- USER / STATUS -->
          <div id="auth-pill" class="auth-pill">
            <span class="auth-pill__dot"></span>
            <span class="auth-pill__text">Offline</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN APP -->
  <main id="app" class="app"></main>

  <!-- OVERLAY ROOT -->
  <div id="overlay-root"></div>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox hidden">
    <button class="lightbox-close" type="button" aria-label="Schließen">✕</button>
    <button class="lightbox-nav lightbox-prev" type="button" aria-label="Zurück">‹</button>

    <div class="lightbox-content">
      <img id="lightboxImage" src="" alt="">
      <div class="lightbox-info">
        <span id="lightboxCaption"></span>
      </div>
    </div>

    <button class="lightbox-nav lightbox-next" type="button" aria-label="Weiter">›</button>
  </div>

  <!-- INFO POPUP -->
  <div id="infoPopupModal" class="info-popup hidden">
    <div class="info-popup__overlay" data-popup-close></div>

    <div class="info-popup__card">
      <button class="info-popup__close" type="button" data-popup-close aria-label="Popup schließen">✕</button>

      <div id="infoPopupImageWrap" class="info-popup__image-wrap hidden">
        <img id="infoPopupImage" src="" alt="">
      </div>

      <h2 id="infoPopupTitle"></h2>
      <div id="infoPopupContent" class="info-popup__content"></div>
    </div>
  </div>

  <!-- APP SCRIPT -->
  <script type="module" src="js/app.js"></script>

  ML
<div id="infoPopupModal" class="info-popup hidden">
  <div class="info-popup__overlay" data-popup-close></div>

  <div class="info-popup__card">
    <button class="info-popup__close" type="button" data-popup-close>✕</button>

    <div id="infoPopupImageWrap" class="info-popup__image-wrap hidden">
      <img id="infoPopupImage" src="" alt="">
    </div>

    <h2 id="infoPopupTitle"></h2>
    <div id="infoPopupContent" class="info-popup__content"></div>
  </div>
</div>
  
</body>
</html>
