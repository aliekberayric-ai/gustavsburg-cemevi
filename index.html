<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gustavsburg Cem Evi</title>
  <base href="/gustavsburg-cemevi/" />

  <!-- Split CSS -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/admin.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap" rel="stylesheet">
</head>

<body>
  <header class="topbar">
    <a class="brand" href="#/" data-i18n="brand.title">Gustavsburg Cem Evi</a>

    <nav class="nav">
      <a href="#/" class="nav__link" data-i18n="nav.home">Start</a>
      <a href="#/gallery" class="nav__link" data-i18n="nav.gallery">Galerie</a>
      <a href="#/calendar" class="nav__link" data-i18n="nav.calendar">Kalender</a>
      <a href="#/people" class="nav__link" data-i18n="nav.people">Team</a>
      <a href="#/forms" class="nav__link" data-i18n="nav.forms">Formulare</a>
      <a href="#/admin" class="nav__link nav__link--pill">Admin</a>
    </nav>

    <div class="topbar__right">
      <div class="lang">
        

<div class="lang-switch">

<button data-lang="de" class="lang-btn">
<img src="https://flagcdn.com/w40/de.png" alt="Deutsch">
</button>

<button data-lang="en" class="lang-btn">
<img src="https://flagcdn.com/w40/gb.png" alt="English">
</button>

<button data-lang="tr" class="lang-btn">
<img src="https://flagcdn.com/w40/tr.png" alt="Türkçe">
</button>

</div>
        
      </div>

      <div id="auth-pill" class="auth-pill" title="Login status">
        <span class="dot"></span>
        <span class="auth-pill__text">Offline</span>
      </div>
    </div>
  </header>

  <main id="app" class="app"></main>
  <div id="overlay-root"></div>

<div id="lightbox" class="lightbox hidden">
  <button id="lightboxClose" class="lightbox-close" type="button">×</button>

  <button id="lightboxPrev" class="lightbox-nav lightbox-prev" type="button">‹</button>

  <div class="lightbox-content">
    <img id="lightboxImage" src="" alt="">
    <div class="lightbox-info">
      <span id="lightboxCounter">1 / 1</span>
      <span id="lightboxCaption"></span>
    </div>
  </div>

  <button id="lightboxNext" class="lightbox-nav lightbox-next" type="button">›</button>
</div>
  
  <script type="module" src="js/app.js"></script>
 
</body>
</html>
