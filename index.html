<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gustavsburg Cem Evi</title>

  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/gustavsburg-cemevi/css/components.css?v=30" />

  <style>
    .nav-link {
      color: #ffffff;
      font-size: 22px;
      font-weight: 800;
      text-decoration: none;
      line-height: 1.2;
      padding: 8px 14px;
      border-radius: 14px;
      transition:
        color 0.2s ease,
        background 0.2s ease,
        transform 0.15s ease,
        box-shadow 0.2s ease;
    }

    .nav-link:hover {
      color: #ffd54a;
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    .nav-link:active {
      transform: scale(0.96);
      background: rgba(255,255,255,0.14);
    }

    .nav-link.active {
      color: #ffffff;
      background: linear-gradient(135deg, #d83444, #ff6b57);
      box-shadow: 0 10px 24px rgba(216,52,68,0.35);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="page" style="padding-top:12px;padding-bottom:12px;">
      <div style="display:flex;align-items:center;justify-content:flex-start;gap:28px;flex-wrap:nowrap;">

        <a href="#/" class="site-brand" style="text-decoration:none;color:inherit;">
          <img id="brandLogo" class="hidden" src="" alt="Logo" />
          <span id="brandTitle">Gustavsburg Cem Evi</span>
        </a>

        <nav class="main-nav" style="display:flex;align-items:center;justify-content:flex-start;gap:14px;flex-wrap:nowrap;">
          <a href="#/" class="nav-link">Start</a>
          <a href="#/gallery" class="nav-link">Galerie</a>
          <a href="#/calendar" class="nav-link">Kalender</a>
          <a href="#/people" class="nav-link">Team</a>
          <a href="#/forms" class="nav-link">Formulare</a>
          <a href="#/admin" class="nav-link">Admin</a>
        </nav>

        <div style="display:flex;align-items:center;gap:10px;flex-wrap:nowrap;margin-left:auto;">
          <div class="lang-switch">
            <button type="button" class="lang-btn active" data-lang="de" aria-label="Deutsch">
              <img src="https://flagcdn.com/w40/de.png" alt="Deutsch">
            </button>
            <button type="button" class="lang-btn" data-lang="en" aria-label="English">
              <img src="https://flagcdn.com/w40/gb.png" alt="English">
            </button>
            <button type="button" class="lang-btn" data-lang="tr" aria-label="Türkçe">
              <img src="https://flagcdn.com/w40/tr.png" alt="Türkçe">
            </button>
          </div>

          <div id="auth-pill" class="auth-pill">
            <span class="auth-pill__dot"></span>
            <span class="auth-pill__text">Offline</span>
          </div>
        </div>

      </div>
    </div>
  </header>

  <main id="app" class="app"></main>

  <div id="overlay-root"></div>

  <div id="lightbox" class="lightbox hidden">
    <button class="lightbox-close" type="button" aria-label="Schließen">✕</button>
    <button class="lightbox-nav lightbox-prev" type="button" aria-label="Zurück">‹</button>

    <div class="lightbox-content">
      <img id="lightboxImage" src="" alt="">
      <div class="lightbox-info">
        <span id="lightboxCaption"></span>
      </div>
    </div>

    <button class="lightbox-nav lightbox-next" type="button" aria-label="Weiter">›</button>
  </div>

  <div id="infoPopupModal" class="info-popup hidden">
    <div class="info-popup__overlay" data-popup-close></div>
    <div class="info-popup__card">
      <button class="info-popup__close" type="button" data-popup-close aria-label="Popup schließen">✕</button>
      <div id="infoPopupImageWrap" class="info-popup__image-wrap hidden">
        <img id="infoPopupImage" src="" alt="">
      </div>
      <h2 id="infoPopupTitle"></h2>
      <div id="infoPopupContent" class="info-popup__content"></div>
    </div>
  </div>

  <script type="module" src="/gustavsburg-cemevi/js/app.js?v=30"></script>
</body>
</html>
